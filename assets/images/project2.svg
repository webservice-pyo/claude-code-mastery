<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- 배경 -->
  <rect width="800" height="400" fill="#d1fae5"/>

  <!-- 화면/모니터 아이콘 -->
  <!-- 화면 테두리 -->
  <rect x="240" y="120" width="320" height="200" fill="none" stroke="#10b981" stroke-width="8" rx="8"/>

  <!-- 화면 내부 표시 -->
  <line x1="260" y1="140" x2="540" y2="140" stroke="#10b981" stroke-width="4"/>
  <line x1="260" y1="170" x2="540" y2="170" stroke="#10b981" stroke-width="4"/>
  <line x1="260" y1="200" x2="540" y2="200" stroke="#10b981" stroke-width="4"/>
  <line x1="260" y1="230" x2="480" y2="230" stroke="#10b981" stroke-width="4"/>

  <!-- 모니터 스탠드 -->
  <rect x="360" y="320" width="80" height="8" fill="#10b981" rx="4"/>
  <rect x="375" y="328" width="50" height="16" fill="#10b981" rx="4"/>

  <!-- 텍스트 -->
  <text x="400" y="370" font-size="36" font-weight="bold" fill="#10b981" text-anchor="middle" font-family="Inter, sans-serif">Project 2</text>
</svg>
